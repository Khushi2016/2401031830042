<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CodeMentor AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-4">
  <span class="navbar-brand">CodeMentor AI</span>
</nav>

<div class="container-fluid">
  <div class="row">

    <!-- Sidebar -->
    <div class="col-md-2 sidebar p-3">
      <h5>Menu</h5>
      <ul class="nav flex-column">
        <li class="nav-item"><a class="nav-link active" href="#">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Tutorials</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Challenges</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Progress</a></li>
      </ul>
    </div>

    <!-- Main Content -->
    <div class="col-md-10 p-4">

      <h2>Welcome, User 👋</h2>

      <!-- Progress -->
      <div class="card p-3 mt-3">
        <h5>Your Progress</h5>
        <div class="progress">
          <div class="progress-bar bg-success" style="width: 60%;">60%</div>
        </div>
      </div>

      <!-- AI Suggestion -->
      <div class="card p-3 mt-3">
        <h5>🤖 AI Suggestion</h5>
        <p id="suggestion">Loading...</p>
        <button class="btn btn-primary" onclick="getSuggestion()">Get Recommendation</button>
      </div>

      <!-- Courses -->
      <div class="row mt-4">
        <div class="col-md-4">
          <div class="card p-3">
            <h5>HTML Basics</h5>
            <p>Learn structure of web pages</p>
            <button class="btn btn-outline-primary">Start</button>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card p-3">
            <h5>CSS Styling</h5>
            <p>Make websites beautiful</p>
            <button class="btn btn-outline-primary">Start</button>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card p-3">
            <h5>JavaScript</h5>
            <p>Add interactivity</p>
            <button class="btn btn-outline-primary">Start</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
